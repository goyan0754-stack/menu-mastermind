<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TA&I Analyzer — Copywriting Menu par Henri F.</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A08;--bg2:#111110;--bg3:#1A1A17;--bg4:#222220;
  --border:#2A2A27;--border2:#3A3A37;
  --text:#F5F4F0;--text2:#A8A79F;--text3:#6A6A62;
  --gold:#C8A86B;--gold2:#E8C98B;--gold3:#A8882B;
  --green:#4CAF7A;--green2:#2A6B47;
  --red:#E85555;--red2:#6B2A2A;
  --blue:#5B9BD5;--blue2:#2A4B6B;
  --r:8px;--r2:14px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400;line-height:1.2}
input,textarea,select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--r);padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;outline:none;transition:border 0.2s}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:80px}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;border-radius:var(--r);padding:10px 20px;font-size:14px;font-weight:500;transition:all 0.2s}
button:disabled{opacity:0.5;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,var(--gold3),var(--gold));color:#0A0A08;font-weight:600}
.btn-gold:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn 0.4s ease}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ╔══════════════════════════════════════════════════════╗
// ║  CONFIG — COLLE TES 5 VALEURS ICI, C'EST TOUT        ║
// ╚══════════════════════════════════════════════════════╝
const CONFIG = {
  ANTHROPIC_API_KEY:  "",
  SHEETS_WEBHOOK:     "",
  SHEET_ID:           "137tAykDIpaSsTkjjFzPuw4rOCKw5UXnCh540WGduU08",
  STRIPE_URL_9EUR:    "https://buy.stripe.com/9B6fZhbSZdxxbPNdZ8d7q02",
  STRIPE_URL_29EUR:   "https://buy.stripe.com/7sYdR9cX38dd075bR0d7q03",
  FREE_QUOTA: 3, PRICE_UNIT: 9, PRICE_ABO: 29,
};

// Prompt Zoran — côté serveur uniquement dans api/generate.js

// Utilitaires
const Store = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  usage: () => Store.get('tai_v2') || { count:0,email:null,paid:false,plan:null,nom:'',resto:'',tel:'',credits_bonus:0 },
  save: v => Store.set('tai_v2', v),
  // Vérifie si l'utilisateur peut encore générer
  canGen: (u) => {
    if (!u.email) return false;
    if (u.plan === 'illimite' || u.plan === 'offert' || u.plan === 'abo') return true;
    const totalDispo = CONFIG.FREE_QUOTA + (u.credits_bonus || 0);
    return u.count < totalDispo;
  },
  remaining: (u) => {
    if (u.plan === 'illimite' || u.plan === 'offert' || u.plan === 'abo') return Infinity;
    return Math.max(0, CONFIG.FREE_QUOTA + (u.credits_bonus || 0) - u.count);
  }
};

async function log(data) {
  try {
    await fetch('/api/supabase-log', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({...data, timestamp: new Date().toISOString()})
    });
  } catch(e) { console.warn('log:', e.message); }
}

async function loadAdminData() {
  try {
    const r = await fetch('/api/supabase-admin-users?t='+Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();
    return j.users || [];
  } catch(e) {
    console.warn('admin-users:', e.message);
    return [
      {Email:'marie@bistrot.fr',Nom:'Marie',Restaurant:'Le Bistrot du Port',Telephone:'0612345678','Nb requetes':5,'Total depense':27,Plan:'abo','Score moyen':16.2,'Derniere activite':'19/04 14:23'},
      {Email:'jean@provence.fr',Nom:'Jean',Restaurant:'La Provence',Telephone:'0698765432','Nb requetes':3,'Total depense':0,Plan:'free','Score moyen':14.8,'Derniere activite':'18/04 10:11'},
      {Email:'sophie@jardin.fr',Nom:'Sophie',Restaurant:'Le Jardin Secret',Telephone:'0645678901','Nb requetes':12,'Total depense':58,Plan:'abo','Score moyen':17.4,'Derniere activite':'19/04 09:05'},
    ];
  }
}

async function callZoran(d) {
  const r = await fetch('/api/generate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      resto:d.resto, nom_plat:d.nom_plat, type_plat:d.type_plat,
      description_actuelle:d.description_actuelle, infos:d.infos||''
    })
  });
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.error||`Erreur ${r.status}`); }
  return await r.json();
}

// Composants
function ScoreBadge({score}) {
  const s=Number(score)||0, c=s>=15?'#4CAF7A':s>=8?'#C8A86B':'#E85555';
  return <div style={{display:'inline-flex',alignItems:'center',gap:6,background:`${c}18`,border:`1px solid ${c}50`,borderRadius:20,padding:'4px 12px'}}><span style={{fontWeight:700,color:c,fontSize:16}}>S={s.toFixed(1)}</span><span style={{fontSize:11,color:c}}>{s>=15?'Exceptionnel':s>=8?'Bon':'Faible'}</span></div>;
}

function Bar({label,value}) {
  const v=Number(value)||0;
  return <div style={{marginBottom:5}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}><span style={{fontSize:12,color:'var(--text3)'}}>{label}</span><span style={{fontSize:12,color:'var(--text2)'}}>{v.toFixed(2)}</span></div><div style={{height:3,background:'var(--bg4)',borderRadius:2}}><div style={{height:3,background:'var(--gold)',borderRadius:2,width:`${Math.min(v*100,100)}%`,transition:'width 1s'}}/></div></div>;
}

function EmailGate({onSubmit}) {
  const [nom,setNom]=useState('');
  const [resto,setResto]=useState('');
  const [email,setEmail]=useState('');
  const [tel,setTel]=useState('');
  const [err,setErr]=useState({});
  const [loading,setLoading]=useState(false);
  const go=async()=>{
    const e={};
    if(!nom.trim())e.nom='Requis';
    if(!resto.trim())e.resto='Requis';
    if(!/\S+@\S+\.\S+/.test(email))e.email='Email invalide';
    if(Object.keys(e).length){setErr(e);return;}
    setLoading(true);
    try {
      let existingState = null;
      try {
        const r = await fetch(`/api/supabase-get-usage?email=${encodeURIComponent(email)}`);
        if (r.ok) { const d = await r.json(); if (d.exists) existingState = d; }
      } catch(ex) { console.warn('get-usage:', ex.message); }
      await log({action:'signup',nom,resto,email,tel});
      onSubmit({nom,resto,email,tel, existingState});
    } finally { setLoading(false); }
  };
  return (
    <div style={{maxWidth:440,margin:'0 auto'}}>
      <div className="card">
        <h2 style={{fontSize:22,marginBottom:4}}>Commencer gratuitement</h2>
        <p style={{color:'var(--text2)',fontSize:14,marginBottom:20}}>3 descriptions offertes · Aucune carte requise</p>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div>
            <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Votre prénom <span style={{color:'var(--gold)'}}>*</span></label>
            <input placeholder="Marie" value={nom} onChange={e=>setNom(e.target.value)} style={err.nom?{borderColor:'var(--red)'}:undefined}/>
            {err.nom&&<p style={{color:'var(--red)',fontSize:12,marginTop:3}}>{err.nom}</p>}
          </div>
          <div>
            <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Nom du restaurant <span style={{color:'var(--gold)'}}>*</span></label>
            <input placeholder="Le Bistrot du Port" value={resto} onChange={e=>setResto(e.target.value)} style={err.resto?{borderColor:'var(--red)'}:undefined}/>
            {err.resto&&<p style={{color:'var(--red)',fontSize:12,marginTop:3}}>{err.resto}</p>}
          </div>
          <div>
            <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Email <span style={{color:'var(--gold)'}}>*</span></label>
            <input type="email" placeholder="contact@monresto.fr" value={email} onChange={e=>setEmail(e.target.value)} style={err.email?{borderColor:'var(--red)'}:undefined}/>
            {err.email&&<p style={{color:'var(--red)',fontSize:12,marginTop:3}}>{err.email}</p>}
          </div>
          <div>
            <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Téléphone</label>
            <input type="tel" placeholder="06 00 00 00 00" value={tel} onChange={e=>setTel(e.target.value)}/>
          </div>
          <button className="btn-gold" onClick={go} disabled={loading} style={{marginTop:8,padding:'13px 20px',fontSize:15}}>
            {loading?<span><span className="spinner" style={{marginRight:8}}/>Enregistrement...</span>:'→ Commencer gratuitement'}
          </button>
        </div>
        <p style={{fontSize:11,color:'var(--text3)',marginTop:12,textAlign:'center'}}>Données protégées · Jamais revendues</p>
      </div>
    </div>
  );
}

function Paywall({usage,onPaySuccess}) {
  const ok = CONFIG.STRIPE_URL_9EUR!=='VOTRE_LIEN_STRIPE_9EUR';
  const pay=type=>{
    if(!ok){if(window.confirm(`Mode démo — simuler paiement ${type==='unit'?'9':'29'}€ ?`))onPaySuccess(type==='abo'?'abo':'unit');return;}
    const email=encodeURIComponent(usage.email||'');
    log({action:'payment_intent',email:usage.email,resto:usage.resto,type,amount:type==='unit'?9:29});
    window.open(`${type==='unit'?CONFIG.STRIPE_URL_9EUR:CONFIG.STRIPE_URL_29EUR}?prefilled_email=${email}`,'_blank');
  };
  return (
    <div style={{maxWidth:520,margin:'0 auto'}}>
      {!ok&&<div style={{background:'var(--red2)',border:'1px solid var(--red)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:16,fontSize:13,color:'var(--red)'}}>⚠️ Mode démo — Stripe non configuré</div>}
      <div className="card" style={{textAlign:'center',marginBottom:20}}>
        <div style={{fontSize:32,marginBottom:10}}>🔒</div>
        <h2 style={{fontSize:22,marginBottom:8}}>Quota gratuit utilisé</h2>
        <p style={{color:'var(--text2)',fontSize:14}}>Choisissez une option pour continuer</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <div className="card" style={{textAlign:'center'}}>
          <p style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>À la carte</p>
          <p style={{fontSize:28,fontWeight:700,marginBottom:2}}>{CONFIG.PRICE_UNIT}€</p>
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>par description</p>
          <button className="btn-outline" onClick={()=>pay('unit')} style={{width:'100%'}}>Payer {CONFIG.PRICE_UNIT}€</button>
        </div>
        <div className="card" style={{textAlign:'center',borderColor:'var(--gold3)'}}>
          <span className="pill" style={{background:'var(--gold3)',color:'#0A0A08',fontSize:11,marginBottom:8,display:'inline-block'}}>⭐ Meilleure offre</span>
          <p style={{fontSize:28,fontWeight:700,color:'var(--gold2)',marginBottom:2}}>{CONFIG.PRICE_ABO}€</p>
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>/mois · 30 descriptions</p>
          <button className="btn-gold" onClick={()=>pay('abo')} style={{width:'100%'}}>S'abonner</button>
        </div>
      </div>
      <p style={{textAlign:'center',fontSize:12,color:'var(--text3)',marginTop:14}}>💳 Stripe sécurisé · Résiliation à tout moment</p>
    </div>
  );
}

function GenForm({usage,onResult,onLogout}) {
  const [nomPlat,setNomPlat]=useState('');
  const [typePlat,setTypePlat]=useState('viande');
  const [descActuelle,setDescActuelle]=useState('');
  const [infos,setInfos]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const rem = Store.remaining(usage);
  const canGen = Store.canGen(usage);
  const isIllimite = usage.plan === 'illimite' || usage.plan === 'offert';
  const go=async()=>{
    if(!nomPlat.trim()||!descActuelle.trim()){setErr('Nom du plat et description requis.');return;}
    if(CONFIG.ANTHROPIC_API_KEY==='VOTRE_CLE_API_ANTHROPIC'){setErr('Clé API Anthropic non configurée dans CONFIG.');return;}
    setErr('');setLoading(true);
    try {
      const res=await callZoran({nom_plat:nomPlat,type_plat:typePlat,description_actuelle:descActuelle,infos,resto:usage.resto});
      await log({action:'generation',email:usage.email,nom:usage.nom,resto:usage.resto,tel:usage.tel||'',plat:nomPlat,score_a:res.variante_a?.score_s||0,score_b:res.variante_b?.score_s||0,formule:res.formule_utilisee,plan:usage.paid?usage.plan:'free',req_count:usage.count+1});
      onResult(res,{nom_plat:nomPlat,type_plat:typePlat,description_actuelle:descActuelle,infos});
    } catch(e){setErr(`Erreur TA&I : ${e.message}`);}
    finally{setLoading(false);}
  };
  return (
    <div style={{maxWidth:560,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div><h2 style={{fontSize:20,marginBottom:2}}>Bonjour {usage.nom} 👋</h2><p style={{fontSize:13,color:'var(--text3)'}}>{usage.resto}</p></div>
        <div style={{textAlign:'right'}}>
          {isIllimite ? (
            <span className="pill" style={{background:'#3A2A6B',color:'#B09FEE',display:'inline-block',marginBottom:4}}>
              {usage.plan==='offert'?'🎁 Offert':'♾️ Illimité'}
            </span>
          ) : !usage.paid ? (
            <p style={{fontSize:13,color:rem>0?'var(--gold)':'var(--red)',marginBottom:4}}>
              {rem>0 ? `${rem} description${rem>1?'s':''} restante${rem>1?'s':''}` : 'Quota épuisé'}
            </p>
          ) : (
            <span className="pill" style={{background:'var(--green2)',color:'var(--green)',display:'inline-block',marginBottom:4}}>✓ Abonné</span>
          )}
          <br/><button className="btn-outline" onClick={onLogout} style={{fontSize:11,padding:'4px 10px',marginTop:4}}>Changer de compte</button>
        </div>
      </div>
      <div className="card">
        <h3 style={{fontSize:16,marginBottom:16}}>Analyser un plat</h3>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Nom du plat <span style={{color:'var(--gold)'}}>*</span></label>
              <input placeholder="Poulet rôti" value={nomPlat} onChange={e=>setNomPlat(e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Type de plat</label>
              <select value={typePlat} onChange={e=>setTypePlat(e.target.value)}>
                <option value="viande">Viande</option>
                <option value="poisson">Poisson</option>
                <option value="vegetarien">Végétarien</option>
                <option value="entree">Entrée</option>
                <option value="dessert">Dessert</option>
                <option value="plat_du_jour">Plat du jour</option>
                <option value="boisson">Boisson</option>
                <option value="autre">Autre</option>
              </select>
            </div>
          </div>
          <div>
            <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Description actuelle <span style={{color:'var(--gold)'}}>*</span></label>
            <textarea placeholder="Ex : Poulet rôti aux herbes, pommes de terre" value={descActuelle} onChange={e=>setDescActuelle(e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:12,color:'var(--text3)',display:'block',marginBottom:4}}>Infos complémentaires <span style={{color:'var(--text3)'}}>(producteur, technique, histoire...)</span></label>
            <textarea placeholder="Ex : Éleveur local, cuisson 3h, recette familiale 1972..." value={infos} onChange={e=>setInfos(e.target.value)} style={{minHeight:60}}/>
          </div>
          {err&&<div style={{color:'var(--red)',fontSize:13,background:'var(--red2)',padding:'10px 14px',borderRadius:'var(--r)'}}>{err}</div>}
          {!canGen ?
            <div style={{textAlign:'center',padding:'1rem',background:'var(--bg3)',borderRadius:'var(--r)',fontSize:14,color:'var(--text2)'}}>Quota épuisé · <button onClick={()=>window.location.hash='paywall'} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:14,textDecoration:'underline'}}>Voir les offres</button></div>
            :<button className="btn-gold" onClick={go} disabled={loading||!nomPlat||!descActuelle} style={{padding:'13px 20px',fontSize:15}}>
              {loading?<span><span className="spinner" style={{marginRight:8}}/>TA&I analyse...</span>:'⚡ Générer avec TA&I'}
            </button>}
        </div>
      </div>
    </div>
  );
}

function ResCard({variant,label}) {
  const [cp,setCp]=useState(false);
  return (
    <div className="card fade-in" style={{borderColor:label==='A'?'var(--gold3)':'var(--border)',position:'relative',paddingTop:label==='A'?'2rem':'1.5rem'}}>
      {label==='A'&&<div style={{position:'absolute',top:-10,left:16}}><span className="pill" style={{background:'var(--gold3)',color:'#0A0A08',fontSize:11}}>⭐ Meilleure variante</span></div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
        <div style={{flex:1,paddingRight:8}}><span style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.1em'}}>Variante {label}</span><h3 style={{fontSize:15,color:'var(--gold2)',marginTop:2}}>{variant.titre}</h3></div>
        <ScoreBadge score={variant.score_s}/>
      </div>
      <p style={{color:'var(--text2)',fontSize:13,lineHeight:1.8,marginBottom:16}}>{variant.description}</p>
      <button className="btn-outline" onClick={()=>{navigator.clipboard.writeText(`${variant.titre}\n\n${variant.description}`);setCp(true);setTimeout(()=>setCp(false),2000);}} style={{width:'100%',fontSize:13}}>
        {cp?'✓ Copié !':'📋 Copier'}
      </button>
    </div>
  );
}

function ResultView({result,formData,usage,onNew,onPaywall}) {
  const done=!usage.paid&&usage.count>=CONFIG.FREE_QUOTA;
  return (
    <div style={{maxWidth:700,margin:'0 auto'}} className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <h2 style={{fontSize:20}}>Résultats — {formData.nom_plat}</h2>
        <button className="btn-outline" onClick={onNew} style={{fontSize:13}}>← Nouveau plat</button>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:18}}>
        <span className="pill" style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',fontSize:12}}>📐 {result.formule_utilisee}</span>
        <span className="pill" style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text3)',fontSize:12}}>{result.formule_raison}</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:18}}>
        <ResCard variant={result.variante_a} label="A"/><ResCard variant={result.variante_b} label="B"/>
      </div>

      {result.conseil_pro&&(
        <div className="card" style={{borderLeft:'3px solid var(--gold3)',borderRadius:'0 var(--r2) var(--r2) 0',marginBottom:18}}>
          <p style={{fontSize:12,color:'var(--gold3)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.08em'}}>💡 Conseil pro TA&I</p>
          <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.7}}>{result.conseil_pro}</p>
        </div>
      )}
      {done?(
        <div className="card" style={{textAlign:'center',borderColor:'var(--gold3)'}}>
          <p style={{fontSize:15,marginBottom:4}}>Quota gratuit utilisé 🎉</p>
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>Continuez à transformer vos menus</p>
          <button className="btn-gold" onClick={onPaywall} style={{padding:'12px 28px'}}>Continuer avec TA&I →</button>
        </div>
      ):(
        <button className="btn-gold" onClick={onNew} style={{width:'100%',padding:'13px 20px',fontSize:15}}>⚡ Analyser un autre plat</button>
      )}
    </div>
  );
}

function UserModal({user, onClose, onSave}) {
  const g=(k)=>user[k]??'';
  const planActuel=g('Plan');

    try {

function AdminLogin({onLogin}) {
  const [pw,setPw]=useState('');
  const [err,setErr]=useState(false);
  const [loading,setLoading]=useState(false);
  const go=async()=>{
    setLoading(true);
    try{
      const r=await fetch('/api/admin-auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
      const d=await r.json();
      if(d.ok){setErr(false);onLogin();}else{setErr(true);setPw('');}
    }catch{setErr(true);setPw('');}
    setLoading(false);
  };
  return (
    <div style={{maxWidth:340,margin:'0 auto',paddingTop:'4rem'}}>
      <div className="card" style={{textAlign:'center'}}>
        <div style={{fontSize:32,marginBottom:12}}>🔐</div>
        <h2 style={{fontSize:20,marginBottom:16}}>Accès Admin TA&I</h2>
        <input type="password" placeholder="Mot de passe" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==='Enter'&&go()} style={{marginBottom:err?8:16}} autoFocus/>
        {err&&<p style={{color:'var(--red)',fontSize:13,marginBottom:12}}>Mot de passe incorrect</p>}
        <button className="btn-gold" onClick={go} disabled={loading} style={{width:'100%',padding:'11px 20px'}}>
          {loading?<span className="spinner"/>:'Connexion'}
        </button>
      </div>
    </div>
  );
}

function FournisseursForm({ data, onSave }) {

  const [nom, setNom] = useState('');
  const [produits, setProduits] = useState('');
  const [tel, setTel] = useState('');

  const add = () => {
    if (!nom.trim() || !produits.trim()) return;
    const newF = [...fournisseurs, { id: Date.now(), nom: nom.trim(), produits: produits.trim(), tel: tel.trim() }];

    const newF = fournisseurs.filter(f => f.id !== id);

    onSave({ ...data, fournisseurs: newF });

  return (
    <div>
      <h3 style={{ fontSize: 15, marginBottom: 14, color: 'var(--gold2)' }}>📦 Mes fournisseurs</h3>

            <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 3 }}>Nom fournisseur *</label>

          </div>
          <div>
            <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 3 }}>Produits fournis *</label>
            <input placeholder="Ex: bœuf, agneau, porc" value={produits} onChange={e => setProduits(e.target.value)} />

          <div>
            <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 3 }}>Téléphone</label>
            <input placeholder="Ex: 04 91 00 00 00" value={tel} onChange={e => setTel(e.target.value)} />
          </div>
          <button className="btn-gold" onClick={add} disabled={!nom || !produits} style={{ padding: '10px 16px', whiteSpace: 'nowrap' }}>+ Ajouter</button>
        </div>
      </div>

          ))}

  );

// ─── STOCKS ──────────────────────────────────────
function StocksForm({ data, onSave }) {
  const [stocks, setS] = useState(data.stocks || []);
  const [nom, setNom] = useState('');
  const [actuel, setActuel] = useState('');
  const [unite, setUnite] = useState('kg');
  const [conso, setConso] = useState('');
  const [seuil, setSeuil] = useState('');

  const add = () => {
    if (!nom.trim() || !actuel || !conso) return;
    const newS = [...stocks, {
      id: Date.now(),
      nom: nom.trim(),
      actuel: parseFloat(actuel),
      unite: unite,
      conso_semaine: parseFloat(conso),
      seuil_alerte: parseFloat(seuil) || parseFloat(conso) * 0.5,
    }];
    setS(newS);
    onSave({ ...data, stocks: newS });
    setNom(''); setActuel(''); setConso(''); setSeuil('');
  };

  const remove = id => {
    const newS = stocks.filter(s => s.id !== id);
    setS(newS);
    onSave({ ...data, stocks: newS });
  };

  const getEtat = s => {
    const ratio = s.actuel / s.conso_semaine;
    if (ratio <= 0.5) return { label: '🔴 Urgent', color: 'var(--red)' };
    if (ratio <= 1)   return { label: '🟡 Alerte', color: 'var(--gold)' };
    return { label: '🟢 OK', color: 'var(--green)' };
  };

  return (
    <div>
      <h3 style={{ fontSize: 15, marginBottom: 14, color: 'var(--gold2)' }}>📊 Mes stocks actuels</h3>
      <div className="card" style={{ marginBottom: 14 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 0.7fr 1fr 1fr auto', gap: 10, alignItems: 'end' }}>
          <div>
            <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 3 }}>Produit *</label>
            <input placeholder="Ex: Bœuf haché" value={nom} onChange={e => setNom(e.target.value)} />
          </div>
          <div>
            <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 3 }}>Stock actuel *</label>
            <input type="number" placeholder="Ex: 5" value={actuel} onChange={e => setActuel(e.target.value)} />
          </div>
          <div>
            <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 3 }}>Unité</label>
            <select value={unite} onChange={e => setUnite(e.target.value)}>
              <option value="kg">kg</option>
              <option value="L">L</option>
              <option value="pièces">pcs</option>
              <option value="boîtes">boîtes</option>
            </select>
          </div>
          <div>
            <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 3 }}>Conso/semaine *</label>
            <input type="number" placeholder="Ex: 8" value={conso} onChange={e => setConso(e.target.value)} />
          </div>
          <div>
            <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 3 }}>Seuil alerte</label>
            <input type="number" placeholder="Auto" value={seuil} onChange={e => setSeuil(e.target.value)} />
          </div>
          <button className="btn-gold" onClick={add} disabled={!nom || !actuel || !conso} style={{ padding: '10px 14px', whiteSpace: 'nowrap' }}>+ Ajouter</button>
        </div>
      </div>
      {stocks.length === 0 ? (
        <p style={{ fontSize: 13, color: 'var(--text3)', textAlign: 'center', padding: '1rem' }}>Aucun stock enregistré — ajoutez vos produits ci-dessus</p>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 10 }}>
          {stocks.map(s => {
            const etat = getEtat(s);
            const besoin = Math.max(0, s.conso_semaine * 1.3 - s.actuel);
            return (
              <div key={s.id} className="card" style={{ padding: '12px 14px', borderColor: s.actuel <= s.seuil_alerte ? 'var(--red2)' : 'var(--border)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
                  <p style={{ fontSize: 14, fontWeight: 500 }}>{s.nom}</p>
                  <button onClick={() => remove(s.id)} style={{ background: 'none', border: 'none', color: 'var(--text3)', cursor: 'pointer', fontSize: 14 }}>✕</button>
                </div>
                <p style={{ fontSize: 20, fontWeight: 700, color: etat.color, marginBottom: 2 }}>{s.actuel} {s.unite}</p>
                <p style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4 }}>Conso: {s.conso_semaine}{s.unite}/sem · Seuil: {s.seuil_alerte}{s.unite}</p>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <span style={{ fontSize: 11, fontWeight: 500, color: etat.color }}>{etat.label}</span>
                  {besoin > 0 && <span style={{ fontSize: 11, color: 'var(--gold)' }}>→ Commander {besoin.toFixed(1)}{s.unite}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── CHAT COMMANDES ──────────────────────────────
function ChatCommandes({ data, usage }) {
  const [messages, setMessages] = useState(data.chat || []);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useState(null);

  const SUGGESTIONS = [
    "Combien dois-je commander et à qui ?",
    "Quels stocks sont en alerte cette semaine ?",
    "Quel plat mettre en avant ce soir selon mes stocks ?",
    "Génère un bon de commande pour cette semaine",
    "Quel fournisseur contacter en priorité ?",
  ];

  const buildContext = () => {
    const f = data.fournisseurs || [];
    const s = data.stocks || [];
    if (f.length === 0 && s.length === 0) return null;

    const fTexte = f.length > 0
      ? f.map(x => `- ${x.nom} : ${x.produits}${x.tel ? ` (tél: ${x.tel})` : ''}`).join('\n')
      : 'Aucun fournisseur enregistré';

    const sTexte = s.length > 0
      ? s.map(x => {
          const ratio = x.actuel / x.conso_semaine;
          const etat = ratio <= 0.5 ? 'URGENT' : ratio <= 1 ? 'ALERTE' : 'OK';
          const besoin = Math.max(0, x.conso_semaine * 1.3 - x.actuel);
          return `- ${x.nom} : ${x.actuel}${x.unite} en stock | conso ${x.conso_semaine}${x.unite}/sem | état: ${etat}${besoin > 0 ? ` | à commander: ${besoin.toFixed(1)}${x.unite}` : ''}`;
        }).join('\n')
      : 'Aucun stock enregistré';

    return `Tu es ZORAN CMO ENGINE v3.0 — assistant pilotage opérationnel de ${usage.resto}.
Tu aides le restaurateur à gérer ses commandes fournisseurs et ses stocks.
Réponds en français, de façon claire et actionnable.
Utilise des emojis pour les niveaux d'urgence (🔴 urgent, 🟡 alerte, 🟢 ok).

FOURNISSEURS ENREGISTRÉS :
${fTexte}

STOCKS ACTUELS :
${sTexte}

RÈGLE : Si tu recommandes une commande, indique TOUJOURS :
1. Le fournisseur exact à contacter
2. La quantité précise à commander
3. La raison (stock actuel vs besoin semaine)
4. Si applicable : la formule TA&I à utiliser pour promouvoir ce plat`;
  };

  const send = async (msg) => {
    const texte = (msg || input).trim();
    if (!texte) return;

    const ctx = buildContext();
    if (!ctx) {
      setMessages(m => [...m, { role: 'user', content: texte }, { role: 'assistant', content: '⚠️ Ajoutez d\'abord vos fournisseurs et stocks dans les onglets ci-dessus pour que je puisse vous aider.' }]);
      return;
    }

    const newMessages = [...messages, { role: 'user', content: texte }];
    setMessages(newMessages);
    setInput('');
    setLoading(true);

    try {
      const r = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          _pilotage: true,
          _system: ctx,
          _messages: newMessages.map(m => ({ role: m.role, content: m.content })),
          resto: usage.resto,
          nom_plat: 'pilotage',
          type_plat: 'autre',
          description_actuelle: texte,
          infos: 'mode pilotage commandes'
        })
      });

      let reponse = '';
      if (r.ok) {
        const d = await r.json();
        reponse = d._pilotage_response || d.conseil_pro || JSON.stringify(d);
      } else {
        reponse = '❌ Erreur de connexion. Vérifiez que l\'app est déployée sur Vercel.';
      }

      const withReply = [...newMessages, { role: 'assistant', content: reponse }];
      setMessages(withReply);
      StorePilotage.save({ ...data, chat: withReply.slice(-20) });
    } catch {
      setMessages(m => [...m, { role: 'assistant', content: '❌ Erreur de connexion au moteur TA&I.' }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div>
      <h3 style={{ fontSize: 15, marginBottom: 14, color: 'var(--gold2)' }}>💬 Assistant Pilotage TA&I</h3>

      {messages.length === 0 && (
        <div className="card" style={{ marginBottom: 14 }}>
          <p style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 12 }}>Questions fréquentes — cliquez pour envoyer :</p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {SUGGESTIONS.map(s => (
              <button key={s} onClick={() => send(s)} className="btn-outline" style={{ fontSize: 12, padding: '6px 12px', textAlign: 'left' }}>{s}</button>
            ))}
          </div>
        </div>
      )}

      <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 'var(--r2)', padding: '1rem', minHeight: 200, maxHeight: 400, overflowY: 'auto', marginBottom: 12, display: 'flex', flexDirection: 'column', gap: 12 }}>
        {messages.length === 0 && (
          <p style={{ fontSize: 13, color: 'var(--text3)', textAlign: 'center', margin: 'auto' }}>
            Posez votre question sur vos stocks ou commandes
          </p>
        )}
        {messages.map((m, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start' }}>
            <div style={{
              maxWidth: '80%',
              padding: '10px 14px',
              borderRadius: m.role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
              background: m.role === 'user' ? 'var(--gold3)' : 'var(--bg3)',
              color: m.role === 'user' ? '#0A0A08' : 'var(--text)',
              fontSize: 13,
              lineHeight: 1.7,
              whiteSpace: 'pre-wrap'
            }}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
            <div style={{ background: 'var(--bg3)', padding: '10px 14px', borderRadius: '14px 14px 14px 4px', fontSize: 13, color: 'var(--text3)' }}>
              <span className="spinner" style={{ width: 14, height: 14, marginRight: 6 }} />Zoran analyse...
            </div>
          </div>
        )}
      </div>

      <div style={{ display: 'flex', gap: 10 }}>
        <input
          placeholder="Ex: Combien dois-je commander et à qui ?"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && !loading && send()}
          style={{ flex: 1 }}
        />
        <button className="btn-gold" onClick={() => send()} disabled={loading || !input.trim()} style={{ padding: '10px 20px', whiteSpace: 'nowrap' }}>
          Envoyer →
        </button>
      </div>

      {messages.length > 0 && (
        <button onClick={() => { setMessages([]); StorePilotage.save({ ...data, chat: [] }); }} className="btn-outline" style={{ fontSize: 11, padding: '4px 10px', marginTop: 8 }}>
          Effacer la conversation
        </button>
      )}
    </div>
  );
}

// ─── MODULE SMART PILOTAGE COMPLET ───────────────
function SmartPilotage({ usage, onBack }) {
  const [tab, setTab] = useState('fournisseurs');
  const [data, setData] = useState(() => StorePilotage.get());

  const save = newData => {
    setData(newData);
    StorePilotage.save(newData);
  };

  const tabs = [
    { id: 'fournisseurs', label: '📦 Fournisseurs', count: data.fournisseurs?.length || 0 },
    { id: 'stocks', label: '📊 Stocks', count: data.stocks?.length || 0 },
    { id: 'chat', label: '💬 Commandes IA', count: null },
  ];

  const alerts = (data.stocks || []).filter(s => s.actuel <= s.seuil_alerte).length;

  return (
    <div style={{ maxWidth: 860, margin: '0 auto' }} className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20, flexWrap: 'wrap', gap: 10 }}>
        <div>
          <h2 style={{ fontSize: 22, marginBottom: 4 }}>Smart Pilotage</h2>
          <p style={{ fontSize: 13, color: 'var(--text3)' }}>{usage.resto} · Gestion fournisseurs, stocks et commandes assistée par IA</p>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {alerts > 0 && (
            <span className="pill" style={{ background: 'var(--red2)', color: 'var(--red)', fontSize: 12 }}>
              🔴 {alerts} stock{alerts > 1 ? 's' : ''} en alerte
            </span>
          )}
          <button className="btn-outline" onClick={onBack} style={{ fontSize: 13 }}>← Retour</button>
        </div>
      </div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 20, borderBottom: '1px solid var(--border)', paddingBottom: 12 }}>
        {tabs.map(t => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              background: tab === t.id ? 'var(--gold3)' : 'var(--bg3)',
              color: tab === t.id ? '#0A0A08' : 'var(--text2)',
              border: 'none',
              borderRadius: 'var(--r)',
              padding: '8px 16px',
              fontSize: 13,
              fontWeight: tab === t.id ? 600 : 400,
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              gap: 6,
            }}
          >
            {t.label}
            {t.count !== null && t.count > 0 && (
              <span style={{ background: tab === t.id ? 'rgba(0,0,0,0.2)' : 'var(--border2)', borderRadius: 10, padding: '1px 7px', fontSize: 11 }}>{t.count}</span>
            )}
          </button>
        ))}
      </div>

      {tab === 'fournisseurs' && <FournisseursForm data={data} onSave={save} />}
      {tab === 'stocks' && <StocksForm data={data} onSave={save} />}
      {tab === 'chat' && <ChatCommandes data={data} usage={usage} />}
    </div>
  );
}

          <div style={{width:32,height:32,background:'var(--gold3)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#0A0A08',fontFamily:'serif',fontWeight:700}}>T</div>

        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>

          <a href="https://tai-food.com" target="_blank" rel="noreferrer" style={{textDecoration:'none'}}><button className="btn-outline" style={{fontSize:12,padding:'6px 12px'}}>tai-food.com →</button></a>

      </header>

              <h1 style={{fontSize:'clamp(28px,5vw,46px)',marginBottom:16,background:'linear-gradient(135deg,var(--text) 40%,var(--gold))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Transformez vos menus<br/>en machine à vendre</h1>
              <p style={{fontSize:18,color:'var(--text2)',maxWidth:500,margin:'0 auto 2rem',lineHeight:1.7}}>Le seul outil de copywriting menu conçu par un ancien chef. Déclenchez l'envie d'acheter dès la lecture.</p>
              <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap',marginBottom:'2.5rem'}}>
